<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course - Course Organizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Personal Course Organizer</h1>
        <nav>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="one.html">My Course</a></li>
         <li><a href="add-course.html" class="active">Add Course</a></li> 
        <li><a href="contact.html">Contact Us</a></li>
    </ul>
</nav>
    </header>

    <main>
        <section class="form-section">
            <h2 style="text-align: center; margin-top: 20px; color: #2c3e50;">Add a new course</h2>
            
            <form action="#">
                <div class="form-group">
                    <label for="course-name">Course Name :</label>
                    <input type="text" id="course-name" name="course-name" placeholder="ex: Programing" required>
                </div>

                <div class="form-group">
                    <label for="instructor">Lecture :</label>
                    <input type="text" id="instructor" name="instructor" placeholder="Nam's Lecture" required>
                </div>

                <div class="form-group">
                    <label for="hours">Course's Hourse</label>
                    <input type="number" id="hours" name="hours" min="1" max="10" placeholder="Nuber Hourse (1-10)" required>
                </div>

                <div class="form-group">
                    <label for="notes">Extra Note :</label>
                    <textarea id="notes" name="notes" rows="4" placeholder="Type any notes about Course"></textarea>
                </div>

                <button type="submit" class="submit-btn">Save Course</button>
            </form>
        </section>
    </main>

    <footer>
        <p>Directed bu Seif-ELdin</p>
    </footer>

</body>
</html>
